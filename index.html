<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scopa Tracker PRO</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>🃏 Scopa Tracker PRO</h1>
</header>

<section class="dashboard">

    <div class="stat">
        <span id="uscite">0</span>
        <small>Carte Uscite</small>
    </div>

    <div class="stat">
        <span id="rimaste">40</span>
        <small>Carte Rimaste</small>
    </div>

    <div class="stat">
        <span id="denari">10</span>
        <small>Denari Rimasti</small>
    </div>

    <div class="stat">
        <span id="sette">4</span>
        <small>Sette Rimasti</small>
    </div>

    <div class="stat">
        <span id="assi">4</span>
        <small>Assi Rimasti</small>
    </div>

    <div class="stat">
        <span id="figure">12</span>
        <small>Figure Rimaste</small>
    </div>

    <div class="stat">
        <span id="settebello">🟢</span>
        <small>7 Bello</small>
    </div>

    <!-- PROBABILITÀ -->
    <div class="stat">
        <span id="probDenari">0%</span>
        <small>Prob. Denari</small>
    </div>

    <div class="stat">
        <span id="probSettebello">0%</span>
        <small>Prob. 7 Bello</small>
    </div>

    <div class="stat">
        <span id="probSette">0%</span>
        <small>Prob. Sette</small>
    </div>

    <div class="stat">
        <span id="probAsso">0%</span>
        <small>Prob. Asso</small>
    </div>

    <div class="stat">
        <span id="probFigura">0%</span>
        <small>Prob. Figure</small>
    </div>

</section>

<section class="actions">
    <button id="toggleView">👁 Solo carte rimaste</button>
    <button id="undoBtn">↩️ Annulla</button>
    <button id="resetBtn">🔄 Nuova partita</button>
</section>

<section id="cardsContainer"></section>

<section class="history">
    <h2>Cronologia</h2>
    <ul id="historyList"></ul>
</section>

<script src="app.js"></script>

</body>
</html>
