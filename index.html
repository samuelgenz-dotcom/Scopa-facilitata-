<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scopa Tracker</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>🃏 Scopa Tracker</h1>
</header>

<!-- STATISTICHE -->
<section class="dashboard">
  <div class="stat"><span id="uscite">0</span><small>Uscite</small></div>
  <div class="stat"><span id="rimaste">40</span><small>Rimaste</small></div>
  <div class="stat"><span id="settebello">🟢</span><small>7 Bello</small></div>
  <div class="stat"><span id="denari">10</span><small>Denari rim.</small></div>
  <div class="stat"><span id="sette">4</span><small>Sette rim.</small></div>
  <div class="stat"><span id="assi">4</span><small>Assi rim.</small></div>
</section>

<!-- AZIONI -->
<section class="actions">
  <button id="aiBtn">🧠 Consiglio AI</button>
  <button id="toggleView">👁 Solo rimaste</button>
  <button id="undoBtn">↩️ Annulla</button>
  <button id="resetBtn">🔄 Reset</button>
</section>

<!-- MAZZO -->
<section id="cardsContainer"></section>

<!-- PANNELLO AI (nascosto di default) -->
<div id="aiOverlay" class="overlay hidden">
  <div class="panel">
    <div class="panel-header">
      <h2>🧠 Consiglio AI</h2>
      <button id="closePanel">✕</button>
    </div>

    <p class="panel-hint">Seleziona le 3 carte che hai in mano:</p>

    <div id="handPicker"></div>

    <div id="aiResult" class="ai-result hidden"></div>

    <button id="clearHand" class="btn-secondary">🗑 Svuota selezione</button>
  </div>
</div>

<div id="toast"></div>

<script src="app.js"></script>
</body>
</html>
